<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grand Pappy Cappy</title>
  <style>
    body {
      width: 260px;
      text-align: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
      box-sizing: border-box;
      border-radius: 14px;
      border: 2px solid #ff0000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    }

    img {
      width: 110px;
      border-radius: 20px;
      margin-bottom: 10px;
      border: 2px solid #ff0000;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
      transition: transform 0.25s ease;
    }

    img:hover {
      transform: rotate(-2deg) scale(1.07);
    }

    h1 {
      font-size: 16px;
      margin: 6px 0;
      color: #fff;
      letter-spacing: 1px;
    }

    h2 {
      font-size: 13px;
      margin: 4px 0 10px;
      color: #ff4d4d;
      font-weight: bold;
    }

    .desc {
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .author {
  position: relative;
  font-size: 13px;
  font-weight: bold;
  margin: 10px 0;
  color: #fff;
  border-radius: 12px;
  padding: 8px;
  background: #0f0f0f;
  overflow: hidden;
  z-index: 1;
}

/* Inner content layer */
.author::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #0f0f0f;
  border-radius: 10px;
  z-index: -1;
}

/* Animated neon border */
.author::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 14px;
  background: conic-gradient(
    #ff0000,
    #ff4d4d,
    #ffffff,
    #ff0000
  );
  animation: spinBorder 3s linear infinite;
  z-index: -2;
}

/* Animation */
@keyframes spinBorder {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

    .coffee-button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      background: linear-gradient(145deg, #ff0000, #cc0000);
      color: #fff;
      font-weight: bold;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.7);
    }

    .coffee-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255, 0, 0, 1);
    }

    .emoji {
      display: block;
      margin-top: 8px;
      font-size: 18px;
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .tagline {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      font-style: italic;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #ff0000, transparent);
      margin: 12px 0;
    }

    .wave-text span {
  display: inline-block;
  animation: wave 0.8s ease-in-out;
}

/* Stagger each letter */
.wave-text span:nth-child(1) { animation-delay: 0s; }
.wave-text span:nth-child(2) { animation-delay: 0.05s; }
.wave-text span:nth-child(3) { animation-delay: 0.1s; }
.wave-text span:nth-child(4) { animation-delay: 0.15s; }
.wave-text span:nth-child(5) { animation-delay: 0.2s; }
.wave-text span:nth-child(6) { animation-delay: 0.25s; }
.wave-text span:nth-child(7) { animation-delay: 0.3s; }
.wave-text span:nth-child(8) { animation-delay: 0.35s; }
.wave-text span:nth-child(9) { animation-delay: 0.4s; }
.wave-text span:nth-child(10) { animation-delay: 0.45s; }
.wave-text span:nth-child(11) { animation-delay: 0.5s; }
.wave-text span:nth-child(12) { animation-delay: 0.55s; }
.wave-text span:nth-child(13) { animation-delay: 0.6s; }
.wave-text span:nth-child(14) { animation-delay: 0.65s; }
.wave-text span:nth-child(15) { animation-delay: 0.7s; }
.wave-text span:nth-child(16) { animation-delay: 0.75s; }

@keyframes wave {
  0%   { transform: translateY(0); }
  30%  { transform: translateY(-8px); }
  60%  { transform: translateY(4px); }
  100% { transform: translateY(0); }
}

.privacy-button {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  background: transparent;
  color: #ff4d4d;
  font-weight: bold;
  border-radius: 10px;
  text-decoration: none;
  border: 1px solid rgba(255, 0, 0, 0.4);
  transition: all 0.2s ease;
}

.privacy-button:hover {
  background: rgba(255, 0, 0, 0.1);
  color: #fff;
  border-color: #ff0000;
  box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
  transform: scale(1.05);
}
  </style>
